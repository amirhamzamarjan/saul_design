<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaulDesign</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">

    <!-- fonts start -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <!-- fonts end -->
    <!-- icon start -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <!-- icon end -->

<body>
    <!-- menu part start -->
    <header>
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <a class="navbar-brand col-8" href="#">
                    <img src="images/logo.png" alt="SaulDesign">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav ">
                        <a class="nav-link " aria-current="page" href="#">Home</a>
                        <a class="nav-link" href="#">About me</a>
                        <a class="nav-link" href="#">Contact</a>

                    </div>
                </div>
            </div>
        </nav>
    </header>
    <!-- menu part end -->
    <!-- hero part start -->
    <section class=" heroPart container ">
        <div class="heroPartAll row ">


            <div class="heroContentAll  col-6">

                <div class="heroPartOne ">
                    <div class="left-icon">
                        <img src="images/banner arow.png" alt="">
                    </div>
                </div>


                <div class="heroContent">
                    <h1 class=" display-3">
                        CREATIVE UI<br>
                        DESIGNER
                    </h1>

                    <div class="heroBtn mt-3 d-flex gap-3">
                        <a class="btn btn-primary " href="#" role="button">Hire me</a>
                        <a class="btn btn-primary " href="#" download>Download CV<i class="fa fa-download"></i></a>

                    </div>
                </div>
            </div>



            <div class="heroImg col-6 text-center">
                <img src="images/banner.png" alt="SaulDesign">
            </div>

        </div>
    </section>

    <!-- hero part end -->
    <!-- about part start -->
     <div class="aboutPart">
        
     </div>
    <!-- about part end -->



    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
